<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Tanya Pricelist</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
  padding: 20px;
}

.card {
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
  max-width: 350px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.step { display: none; }
.active { display: block; }

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #25D366;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1ebe5d;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.progress {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="card">

<div class="progress" id="progress">Step 1 dari 5</div>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <h3>Siapa nama kamu? 😊</h3>
  <input type="text" id="nama" placeholder="Masukkan nama">
  <button onclick="nextStep(1)">Lanjut</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h3>Pilih layanan 📸</h3>
  <select id="layanan">
    <option value="">-- Pilih --</option>
    <option value="Foto Wisuda">Foto Wisuda</option>
    <option value="Foto Engagement">Foto Engagement</option>
    <option value="Prewedding">Prewedding</option>
    <option value="Wedding">Wedding</option>
    <option value="Event Lainnya">Event Lainnya</option>
  </select>
  <button onclick="nextStep(2)">Lanjut</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <h3>Pilih paket 💰</h3>
  <select id="paket">
    <option value="">-- Pilih --</option>
    <option value="Basic">Basic</option>
    <option value="Premium">Premium</option>
    <option value="Exclusive">Exclusive</option>
  </select>
  <button onclick="nextStep(3)">Lanjut</button>
</div>

<!-- STEP 4 (BARU: TANGGAL) -->
<div class="step" id="step4">
  <h3>Pilih tanggal booking 📅</h3>
  <input type="date" id="tanggal">
  <button onclick="nextStep(4)">Lanjut</button>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
  <h3>Konfirmasi ✅</h3>
  <p id="summary"></p>
  <button onclick="kirimWA()">Kirim ke WhatsApp</button>
</div>

</div>

<script>
let currentStep = 1;

function nextStep(step) {
  if(step === 1 && document.getElementById("nama").value === "") {
    alert("Isi nama dulu!");
    return;
  }

  if(step === 2 && document.getElementById("layanan").value === "") {
    alert("Pilih layanan dulu!");
    return;
  }

  if(step === 3 && document.getElementById("paket").value === "") {
    alert("Pilih paket dulu!");
    return;
  }

  if(step === 4 && document.getElementById("tanggal").value === "") {
    alert("Pilih tanggal dulu!");
    return;
  }

  document.getElementById("step" + step).classList.remove("active");
  document.getElementById("step" + (step+1)).classList.add("active");

  currentStep++;
  updateProgress();

  if(step === 4) {
    tampilkanSummary();
  }
}

function updateProgress() {
  document.getElementById("progress").innerText =
    "Step " + currentStep + " dari 5";
}

function tampilkanSummary() {
  let nama = document.getElementById("nama").value;
  let layanan = document.getElementById("layanan").value;
  let paket = document.getElementById("paket").value;
  let tanggal = document.getElementById("tanggal").value;

  document.getElementById("summary").innerHTML =
    `<b>Nama:</b> ${nama}<br>
     <b>Layanan:</b> ${layanan}<br>
     <b>Paket:</b> ${paket}<br>
     <b>Tanggal:</b> ${tanggal}`;
}

function kirimWA() {
  let nama = document.getElementById("nama").value;
  let layanan = document.getElementById("layanan").value;
  let paket = document.getElementById("paket").value;
  let tanggal = document.getElementById("tanggal").value;

  let nomor = "6285876162867"; // GANTI NOMOR KAMU

  let pesan = `Halo kak 👋
Nama: ${nama}
Layanan: ${layanan}
Paket: ${paket}
Tanggal: ${tanggal}

Boleh minta pricelist lengkapnya? 😊`;

  let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

  window.open(url, '_blank');
}
</script>

</body>
</html>
